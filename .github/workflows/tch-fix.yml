name: TCH Fix

on:
  workflow_dispatch:
    inputs:
      target_file:
        description: 'Target file path (e.g. optuna/samplers/_cmaes.py)'
        required: true

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Checkout upstream/master directly
        run: |
          git clone --depth=1 https://github.com/optuna/optuna.git .
          # upstream/master のみ。fork-only ファイルは一切含まない

      - name: Install ruff
        run: pip install ruff

      - name: Check violations before fix
        run: |
          echo "=== TCH violations in ${{ inputs.target_file }} ==="
          ruff check "${{ inputs.target_file }}" --select TCH001,TCH002,TCH003 || true

      - name: Apply ruff TCH fix
        run: |
          ruff check "${{ inputs.target_file }}" --select TCH001,TCH002,TCH003 --fix --unsafe-fixes || true

      - name: Check remaining violations
        run: |
          echo "=== Remaining violations after fix ==="
          ruff check "${{ inputs.target_file }}" --select TCH001,TCH002,TCH003 || true

      - name: Show diff
        run: git diff

      - name: Push branch to fork
        run: |
          FILE="${{ inputs.target_file }}"
          SLUG=$(echo "$FILE" | sed 's|/|-|g; s|\.|-|g; s|_|-|g')
          BRANCH="fix/tch-${SLUG}"
          git checkout -b "$BRANCH"
          git add "$FILE"
          git commit -m "fix: move type-annotation imports to TYPE_CHECKING in $FILE"
          # fork に push
          git remote add fork https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/yasumorishima/optuna.git
          git push fork "$BRANCH"
          echo ""
          echo "=========================================="
          echo "Branch pushed: $BRANCH"
          echo "Diff contains ONLY the target file. Safe to submit upstream PR."
          echo "=========================================="
