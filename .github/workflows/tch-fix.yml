name: TCH Fix

on:
  workflow_dispatch:
    inputs:
      target_file:
        description: 'Target file path (e.g. optuna/samplers/_cmaes.py)'
        required: true

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/optuna/optuna.git
          git fetch upstream
          git rebase upstream/master

      - name: Install ruff
        run: pip install ruff

      - name: Check violations before fix
        run: |
          echo "=== TCH violations in ${{ inputs.target_file }} ==="
          ruff check "${{ inputs.target_file }}" --select TCH || true

      - name: Apply ruff TCH fix
        run: |
          # --unsafe-fixes も含めて全件修正（TCH ルールは from __future__ import annotations があれば安全）
          ruff check "${{ inputs.target_file }}" --select TCH --fix --unsafe-fixes || true

      - name: Check remaining violations
        run: |
          echo "=== Remaining violations after fix ==="
          ruff check "${{ inputs.target_file }}" --select TCH || true

      - name: Show diff
        run: git diff

      - name: Push branch to fork
        id: branch
        run: |
          FILE="${{ inputs.target_file }}"
          SLUG=$(echo "$FILE" | sed 's|/|-|g; s|\.|-|g; s|_|-|g')
          BRANCH="fix/tch-${SLUG}"
          git checkout -b "$BRANCH"
          git add "$FILE"
          git commit -m "fix: move type-annotation imports to TYPE_CHECKING in $FILE"
          git push origin "$BRANCH"
          echo ""
          echo "=========================================="
          echo "Branch pushed: $BRANCH"
          echo "Review the diff above, then submit PR manually."
          echo "=========================================="
