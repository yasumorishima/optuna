name: TCH Fix

on:
  workflow_dispatch:
    inputs:
      target_file:
        description: 'Target file path (e.g. optuna/samplers/_cmaes.py)'
        required: true

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Checkout upstream/master directly
        run: |
          # fork ではなく upstream から clone することで fork-only ファイルの混入を防ぐ
          git clone --depth=1 https://github.com/optuna/optuna.git .

      - name: Install ruff
        run: pip install ruff

      - name: Check violations before fix
        run: |
          echo "=== TCH violations in ${{ inputs.target_file }} ==="
          ruff check "${{ inputs.target_file }}" --select TCH001,TCH002,TCH003 || true

      - name: Apply ruff TCH fix
        run: |
          # TCH001/002/003 のみ選択（TC006 の cast 変更を除外）
          # 全 TCH fix は unsafe なので --unsafe-fixes 必須
          ruff check "${{ inputs.target_file }}" --select TCH001,TCH002,TCH003 --fix --unsafe-fixes || true

      - name: Check remaining violations
        run: |
          echo "=== Remaining violations after fix ==="
          ruff check "${{ inputs.target_file }}" --select TCH001,TCH002,TCH003 || true

      - name: Show diff
        run: git diff

      - name: Contamination check
        run: |
          CHANGED=$(git diff --name-only)
          echo "=== Changed files ==="
          echo "$CHANGED"

          # target_file 以外が含まれていたら即 FAIL
          UNEXPECTED=$(echo "$CHANGED" | grep -vxF "${{ inputs.target_file }}" || true)
          if [ -n "$UNEXPECTED" ]; then
            echo ""
            echo "::error::CONTAMINATION DETECTED — unexpected files in diff:"
            echo "$UNEXPECTED"
            echo "Do NOT push this branch."
            exit 1
          fi
          echo ""
          echo "✅ Contamination check passed. Only target file is changed."

      - name: Push branch to fork
        run: |
          FILE="${{ inputs.target_file }}"
          SLUG=$(echo "$FILE" | sed 's|/|-|g; s|\.|-|g; s|_|-|g')
          BRANCH="fix/tch-${SLUG}"
          git checkout -b "$BRANCH"
          git add "$FILE"
          git commit -m "fix: move type-annotation imports to TYPE_CHECKING in $FILE"
          git remote add fork https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/yasumorishima/optuna.git
          git push fork "$BRANCH"
          echo ""
          echo "=========================================="
          echo "Branch pushed: $BRANCH"
          echo "Review the diff above, then submit PR manually."
          echo "=========================================="
