name: TCH Survey

on:
  schedule:
    - cron: '0 0 * * 1'  # Every Monday 00:00 UTC
  workflow_dispatch:

jobs:
  survey:
    runs-on: ubuntu-latest
    steps:
      - name: Clone upstream Optuna
        run: git clone --depth=1 https://github.com/optuna/optuna.git

      - name: Install ruff
        run: pip install ruff

      - name: Find remaining TCH violations
        run: |
          cd optuna
          {
            echo "# Optuna TYPE_CHECKING Remaining Files"
            echo "Generated: $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            ruff check . --select TCH --output-format=concise 2>/dev/null \
              | cut -d: -f1 | sort -u
            echo ""
            echo "Total: $(ruff check . --select TCH --output-format=concise 2>/dev/null \
              | cut -d: -f1 | sort -u | wc -l) files remaining"
          } | tee violations.txt

      - uses: actions/upload-artifact@v4
        with:
          name: tch-violations-${{ github.run_id }}
          path: optuna/violations.txt
          retention-days: 14
